<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggy Flow: Level 05-19</title>
    <style>
        :root { --bg: #2440d1; --panel: #1a1a1a; --text: #eee; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-wrap { display: flex; flex-direction: column; align-items: center; gap: 15px; position: relative; }
        #board-container { position: relative; border-radius: 8px; background: #2f43a3; box-shadow: 0 0 40px rgba(0,0,0,0.9); }
        
        /* The reveal text now sits safely underneath the transparent canvas */
        #reveal-text { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9c1a3a; font-weight: 900; text-align: center; z-index: 1; pointer-events: none; width: 100%; height: 100%; }
        
        canvas { background: transparent; cursor: crosshair; position: relative; z-index: 2; image-rendering: pixelated; }
        #ui { display: flex; gap: 12px; padding: 15px; background: var(--panel); border-radius: 15px; border: 1px solid #333; z-index: 3; }
        .pig-btn { width: 55px; height: 55px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border: 2px solid #333; position: relative; }
        .pig-btn:hover:not(.on-belt) { transform: translateY(-5px); border-color: #fff; }
        .pig-btn.on-belt { opacity: 0.5; cursor: wait; border-style: dashed; }
        .pig-btn.empty { display: none; }
        .count { font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; margin-top: 2px; }
    </style>
</head>
<body>
<div id="game-wrap">
    <div id="board-container">
        <div id="reveal-text">
            <div style="font-size: 100px; line-height: 45px;">HAPPY<br>BIRTHDAY</div>
                <div style="font-size: 18px; margin-top: 10px;">I hope you make it to this message<br>couldn't get the pigs faster<br>without it looking crazy</div>
        </div>
        <canvas id="canvas"></canvas>
    </div>
    <div id="ui"></div>
</div>
<script>
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');
const ui = document.getElementById('ui');
const GRID_SIZE = 50;
const OFFSET = 50; 
let cellSize = 10;
cvs.width = cvs.height = (GRID_SIZE * cellSize) + (OFFSET * 2);
let grid = []; 
let pigsInQueue = [];
let activePigs = [];
let projectiles = [];
const IMG_SOURCE = 'pixil-frame-0.png';

function init() {
    const img = new Image();
    img.src = IMG_SOURCE;
    img.onload = () => {
        const tCvs = document.createElement('canvas');
        const tCtx = tCvs.getContext('2d');
        tCvs.width = tCvs.height = GRID_SIZE;
        tCtx.drawImage(img, 0, 0, GRID_SIZE, GRID_SIZE);
        const data = tCtx.getImageData(0, 0, GRID_SIZE, GRID_SIZE).data;
        let counts = {};
        
        for(let y=0; y<GRID_SIZE; y++) {
            grid[y] = [];
            for(let x=0; x<GRID_SIZE; x++) {
                const i = (y * GRID_SIZE + x) * 4;
                let r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                
                let hex = (a < 10 || (r<20 && g<20 && b<20)) ? "#000000" : rgbToHex(r,g,b);
                
                grid[y][x] = { color: hex, active: true, gx: x, gy: y }; 
                counts[hex] = (counts[hex] || 0) + 1;
            }
        }
        pigsInQueue = Object.keys(counts).map(c => ({ color: c, current: counts[c], onBelt: false }));
        renderUI();
        requestAnimationFrame(loop);
    };
}

function rgbToHex(r, g, b) {
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
}

function renderUI() {
    ui.innerHTML = '';
    pigsInQueue.forEach((p, i) => {
        if (p.current <= 0) return;
        const btn = document.createElement('div');
        btn.className = `pig-btn ${p.onBelt ? 'on-belt' : ''}`;
        btn.style.backgroundColor = p.color;
        btn.style.color = p.color === "#000000" ? "#fff" : "#000";
        btn.innerHTML = `<span>🐷</span><span class="count">${p.current}</span>`;
        btn.onclick = () => { if(!p.onBelt) deployPig(i); };
        ui.appendChild(btn);
    });
}

function deployPig(idx) {
    const p = pigsInQueue[idx];
    p.onBelt = true;
    activePigs.push({
        color: p.color,
        pos: 0, 
        speed: 10, 
        uID: idx,
        x: OFFSET, y: OFFSET
    });
    renderUI();
}
    
function update() {
    const beltSize = GRID_SIZE * cellSize + 20; 
    const start = OFFSET - 10;
    const perimeter = beltSize * 4;
    const epsilon = 6;
    
    activePigs.forEach((pig, pIdx) => {
        pig.pos += pig.speed;
        if (pig.pos >= perimeter) {
            pigsInQueue[pig.uID].onBelt = false;
            activePigs.splice(pIdx, 1);
            renderUI();
            return;
        }
        
        if (pig.pos < beltSize) {
            pig.x = start + pig.pos;
            pig.y = start + beltSize;
        } else if (pig.pos < beltSize*2) {
            pig.x = start + beltSize;
            pig.y = start + beltSize - (pig.pos - beltSize);
        } else if (pig.pos < beltSize*3) {
            pig.x = start + beltSize - (pig.pos - beltSize*2);
            pig.y = start;
        } else {
            pig.x = start;
            pig.y = start + (pig.pos - beltSize*3);
        }
        
        const gx = Math.floor((pig.x - OFFSET)/cellSize);
        const gy = Math.floor((pig.y - OFFSET)/cellSize);
        let target = null;

        if (Math.abs(pig.y - (start + beltSize)) < epsilon) {
            if (gx >= 0 && gx < GRID_SIZE) {
                const col = grid.map(r => r[gx]);
                let firstVisible = [...col].reverse().find(c => c.active);
                if (firstVisible && firstVisible.color === pig.color) target = firstVisible;
            }
        } else if (Math.abs(pig.y - start) < epsilon) {
            if (gx >= 0 && gx < GRID_SIZE) {
                const col = grid.map(r => r[gx]);
                let firstVisible = col.find(c => c.active);
                if (firstVisible && firstVisible.color === pig.color) target = firstVisible;
            }
        } else if (Math.abs(pig.x - start) < epsilon) {
            if (gy >= 0 && gy < GRID_SIZE) {
                const row = grid[gy];
                let firstVisible = row.find(c => c.active);
                if (firstVisible && firstVisible.color === pig.color) target = firstVisible;
            }
        } else if (Math.abs(pig.x - (start + beltSize)) < epsilon) {
            if (gy >= 0 && gy < GRID_SIZE) {
                const row = grid[gy];
                let firstVisible = [...row].reverse().find(c => c.active);
                if (firstVisible && firstVisible.color === pig.color) target = firstVisible;
            }
        }
        
        if (target) fire(pig, target);
    });
    
    projectiles = projectiles.filter(p => (p.life -= 0.05) > 0);
}    

function fire(pig, target) {
    projectiles.push({
        x: pig.x, 
        y: pig.y,
        tx: OFFSET + (target.gx * cellSize) + cellSize/2, 
        ty: OFFSET + (target.gy * cellSize) + cellSize/2,
        color: pig.color, 
        life: 1
    });
    target.active = false;
    pigsInQueue[pig.uID].current--;
}

function draw() {
    const start = OFFSET - 10;
    const beltSize = GRID_SIZE * cellSize + 20;
    
    // Clear the canvas completely so CSS background and text show through empty areas
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    
    // Conveyor track (Drawn as a thick hollow line instead of a solid fill)
    const grad = ctx.createLinearGradient(start, start, start+beltSize, start+beltSize);
    grad.addColorStop(0,"#3f5ecf");
    grad.addColorStop(0.5,"#2f43a3");
    grad.addColorStop(1,"#1f2a70");
    
    ctx.strokeStyle = grad;
    ctx.lineWidth = 20; // Matches the width of the belt
    // The stroke draws from the center of the line, so we offset by 10
    roundRect(ctx, start + 10, start + 10, beltSize - 20, beltSize - 20, 8);
    ctx.stroke();
    
    // Track outer border
    ctx.strokeStyle = "#ffffffaa";
    ctx.lineWidth = 2;
    roundRect(ctx, start, start, beltSize, beltSize, 8);
    ctx.stroke();
    
    // Draw grid pixels
    for(let y=0;y<GRID_SIZE;y++){
        for(let x=0;x<GRID_SIZE;x++){
            const c = grid[y][x];
            if(!c.active) continue;
            ctx.fillStyle = c.color;
            ctx.beginPath();
            ctx.roundRect(OFFSET + x*cellSize, OFFSET + y*cellSize, cellSize, cellSize, 2);
            ctx.fill();
        }
    }
    
    // Draw pigs
    activePigs.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x,p.y,10,0,Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#fff";
        ctx.font="12px Arial";
        ctx.fillText("🐷",p.x-7,p.y+5);
    });
    
    // Draw bullets
    projectiles.forEach(p => {
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 3;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.tx, p.ty);
        ctx.stroke();
        ctx.globalAlpha = 1;
    });
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
init();
</script>
</body>
</html>
