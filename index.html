<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Flow: Layered Reveal</title>
    <style>
        :root { --bg: #2440d1; --panel: #1a1a1a; --text: #eee; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-wrap { display: flex; flex-direction: column; align-items: center; gap: 15px; position: relative; }
        #board-container { position: relative; border-radius: 8px; background:  #2f43a3; box-shadow: 0 0 40px rgba(0,0,0,0.9); }
        #reveal-text { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ff3366; font-weight: 900; text-align: center; z-index: 1; pointer-events: none; width: 100%; height: 100%; }
        canvas { background: transparent; cursor: crosshair; position: relative; z-index: 2; image-rendering: pixelated; }
        #ui { display: flex; gap: 12px; padding: 15px; background: var(--panel); border-radius: 15px; border: 1px solid #333; z-index: 3; }
        .pig-btn { width: 55px; height: 55px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border: 2px solid #333; position: relative; }
        .pig-btn:hover:not(.on-belt) { transform: translateY(-5px); border-color: #fff; }
        .pig-btn.on-belt { opacity: 0.5; cursor: wait; border-style: dashed; }
        .pig-btn.empty { display: none; }
        .count { font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; margin-top: 2px; }
    </style>
</head>
<body>

<div id="game-wrap">
    <div id="board-container">
        <div id="reveal-text">
            <div style="font-size: 50px; line-height: 45px;">HAPPY<br>BIRTHDAY</div>
        </div>
        <canvas id="canvas"></canvas>
    </div>
    <div id="ui"></div>
</div>

<script>
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');
const ui = document.getElementById('ui');

const GRID_SIZE = 50;
const OFFSET = 50; 
let cellSize = 10;
cvs.width = cvs.height = (GRID_SIZE * cellSize) + (OFFSET * 2);

let grid = []; // 2D array for easier layer calculations
let pigsInQueue = [];
let activePigs = [];
let projectiles = [];
const IMG_SOURCE = 'pixil-frame-0.png';

function init() {
    const img = new Image();
    img.src = IMG_SOURCE;
    img.onload = () => {
        const tCvs = document.createElement('canvas');
        const tCtx = tCvs.getContext('2d');
        tCvs.width = tCvs.height = GRID_SIZE;
        tCtx.drawImage(img, 0, 0, GRID_SIZE, GRID_SIZE);
        const data = tCtx.getImageData(0, 0, GRID_SIZE, GRID_SIZE).data;

        let counts = {};
        // Initialize 2D Grid
        for(let y=0; y<GRID_SIZE; y++) {
            grid[y] = [];
            for(let x=0; x<GRID_SIZE; x++) {
                const i = (y * GRID_SIZE + x) * 4;
                let r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                
                // If black or transparent, force it to be a "Black Target"
                let hex = (a < 10 || (r<20 && g<20 && b<20)) ? "#000000" : rgbToHex(r,g,b);
                
                grid[y][x] = { color: hex, active: true };
                counts[hex] = (counts[hex] || 0) + 1;
            }
        }

        pigsInQueue = Object.keys(counts).map(c => ({ color: c, current: counts[c], onBelt: false }));
        renderUI();
        requestAnimationFrame(loop);
    };
}

function rgbToHex(r, g, b) {
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
}

function renderUI() {
    ui.innerHTML = '';
    pigsInQueue.forEach((p, i) => {
        if (p.current <= 0) return;
        const btn = document.createElement('div');
        btn.className = `pig-btn ${p.onBelt ? 'on-belt' : ''}`;
        btn.style.backgroundColor = p.color;
        btn.style.color = p.color === "#000000" ? "#fff" : "#000";
        btn.innerHTML = `<span>🐷</span><span class="count">${p.current}</span>`;
        btn.onclick = () => { if(!p.onBelt) deployPig(i); };
        ui.appendChild(btn);
    });
}

function deployPig(idx) {
    const p = pigsInQueue[idx];
    p.onBelt = true;
    activePigs.push({
        color: p.color,
        pos: 0, 
        speed: 4, 
        uID: idx,
        x: OFFSET, y: OFFSET
    });
    renderUI();
}
    
function update() {
    const beltSize = GRID_SIZE * cellSize + 20; // perimeter size
    const start = OFFSET - 10;                 // track offset
    const perimeter = beltSize * 4;
    const eps = 3; // tolerance for edge detection

    // Move active pigs
    activePigs.forEach((pig, pIdx) => {
        pig.pos += pig.speed;

        // Return to queue if finished loop
        if (pig.pos >= perimeter) {
            pigsInQueue[pig.uID].onBelt = false;
            activePigs.splice(pIdx, 1);
            renderUI();
            return;
        }

        // Map counter-clockwise perimeter position to x/y
        if (pig.pos < beltSize) {
            // Bottom edge → moving right
            pig.x = start + pig.pos;
            pig.y = start + beltSize;
        } else if (pig.pos < beltSize * 2) {
            // Right edge → moving up
            pig.x = start + beltSize;
            pig.y = start + beltSize - (pig.pos - beltSize);
        } else if (pig.pos < beltSize * 3) {
            // Top edge → moving left
            pig.x = start + beltSize - (pig.pos - beltSize * 2);
            pig.y = start;
        } else {
            // Left edge → moving down
            pig.x = start;
            pig.y = start + (pig.pos - beltSize * 3);
        }

        // Determine grid coordinates
        const gridX = Math.floor((pig.x - OFFSET) / cellSize);
        const gridY = Math.floor((pig.y - OFFSET) / cellSize);

        // -------- Shooting logic --------
        let target = null;

        // Horizontal edges (Top/Bottom) → vertical shooting
        if (Math.abs(pig.y - (start + beltSize)) < eps) {
            // Bottom edge → shoot up
            const col = grid.map(r => r[gridX]);
            target = [...col].reverse().find(c => c.active && c.color === pig.color);
            if (target) fire(pig, target, gridX, grid.findIndex(r => r.includes(target)));
        } else if (Math.abs(pig.y - start) < eps) {
            // Top edge → shoot down
            const col = grid.map(r => r[gridX]);
            target = col.find(c => c.active && c.color === pig.color);
            if (target) fire(pig, target, gridX, grid.findIndex(r => r.includes(target)));
        }

        // Vertical edges (Left/Right) → horizontal shooting
        if (Math.abs(pig.x - (start + beltSize)) < eps) {
            // Right edge → shoot left
            const row = grid[gridY];
            target = [...row].reverse().find(c => c.active && c.color === pig.color);
            if (target) fire(pig, target, row.indexOf(target), gridY);
        } else if (Math.abs(pig.x - start) < eps) {
            // Left edge → shoot right
            const row = grid[gridY];
            target = row.find(c => c.active && c.color === pig.color);
            if (target) fire(pig, target, row.indexOf(target), gridY);
        }
    });

    // Update bullets (move and fade)
    projectiles = projectiles.filter(p => {
        const dx = p.tx - p.x;
        const dy = p.ty - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const speed = 10; // bullet speed

        if (dist > speed) {
            p.x += (dx/dist) * speed;
            p.y += (dy/dist) * speed;
        } else {
            p.x = p.tx;
            p.y = p.ty;
        }

        p.life -= 0.05;
        return p.life > 0;
    });
}

function fire(pig, target, gx, gy) {
    // To find the actual target object index for ammo subtraction
    // we need its real coordinates because .find() returned a reference
    projectiles.push({
        x: pig.x, y: pig.y,
        tx: OFFSET + (grid[0].indexOf(target) * cellSize) + cellSize/2, // Rough index find
        ty: OFFSET + (grid.findIndex(r => r.includes(target)) * cellSize) + cellSize/2,
        color: pig.color, life: 1
    });
    target.active = false;
    pigsInQueue[pig.uID].current--;
}

function draw() {
    ctx.clearRect(0, 0, cvs.width, cvs.height);

    
    
    // Draw Grid
    for(let y=0; y<GRID_SIZE; y++) {
        for(let x=0; x<GRID_SIZE; x++) {
            const c = grid[y][x];
            if(!c.active) continue;
            ctx.fillStyle = c.color; // or 'rgba(r,g,b,1)' to enforce full opacity
            ctx.beginPath();
            ctx.roundRect(
                OFFSET + x*cellSize,       // remove +1
                OFFSET + y*cellSize,       // remove +1
                cellSize,                  // use full size
                cellSize,                  // full height
                2                          // subtle rounding
            );
            ctx.fill();
        }
    }

    // Draw Pigs
    activePigs.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    
        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        ctx.fillText("🐷", p.x-7, p.y+5);
    });

    // Draw Beams
    projectiles.forEach(p => {
        // Move bullet towards target
        const dx = p.tx - p.x;
        const dy = p.ty - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const speed = 10; // bullet speed
        if(dist > speed) {
            p.x += (dx/dist) * speed;
            p.y += (dy/dist) * speed;
        } else {
            p.x = p.tx;
            p.y = p.ty;
        }
    
        // Draw bullet
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI*2); // small bullet
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
        ctx.fill();
        ctx.shadowBlur = 0;
    
        // Fade out
        p.life -= 0.05;
    });
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
init();
</script>
</body>
</html>
